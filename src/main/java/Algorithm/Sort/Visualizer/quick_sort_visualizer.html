<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>퀵 정렬 시각화</title>
</head>
<style>
  .qs-wrap {
    padding: 1rem 0;
    font-family: var(--font-sans);
  }

  .qs-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .qs-btn {
    cursor: pointer;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: var(--surface-2);
    color: var(--text-primary);
  }

  .qs-btn:hover {
    background: var(--surface-1);
  }

  .qs-btn.primary {
    background: var(--bg-accent);
    color: var(--text-accent);
    border-color: var(--border-accent);
  }

  .qs-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .qs-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 0.75rem;
  }

  .qs-row input[type=range] {
    flex: 1;
    max-width: 120px;
  }

  .qs-row span.val {
    font-weight: 500;
    color: var(--text-primary);
    min-width: 28px;
  }

  .bar-area {
    display: grid;
    align-items: flex-end;
    gap: 2px;
    height: 160px;
    margin-bottom: 1rem;
    width: 100%;
    box-sizing: border-box;
  }

  .bar {
    border-radius: 4px 4px 0 0;
    transition: height 0.15s, background 0.15s;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    width: 100%;
    min-width: 1px;
    box-sizing: border-box;
  }

  .bar span {
    font-size: 10px;
    font-weight: 500;
    margin-bottom: 3px;
    overflow: hidden;
  }

  .bar.normal {
    background: #AFA9EC;
  }

  .bar.pivot {
    background: #0000ff;
  }

  .bar.comparing {
    background: #1D9E75;
  }

  .bar.swap {
    background: #EF9F27;
  }

  .bar.sorted {
    background: #ff0063;
  }

  .bar.range {
    background: #B5D4F4;
  }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 11px;
    height: 11px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .log {
    background: var(--surface-1);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 13px;
    font-size: 13px;
    color: var(--text-secondary);
    min-height: 38px;
    line-height: 1.6;
  }

  .phase-tag {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    margin-right: 6px;
  }

  .phase-pivot {
    background: #FAECE7;
    color: #993C1D;
  }

  .phase-compare {
    background: #E1F5EE;
    color: #0F6E56;
  }

  .phase-swap {
    background: #FAEEDA;
    color: #854F0B;
  }

  .phase-done {
    background: #EAF3DE;
    color: #ff0063;
  }

  .step-counter {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 5px;
    text-align: right;
  }
</style>

<body>
<div class="qs-wrap">
  <h2 class="sr-only">퀵 정렬 시각화 — 배열 크기와 속도를 조절할 수 있습니다</h2>

  <div class="qs-row">
    <span>배열 크기</span>
    <input type="range" id="sizeSlider" min="4" max="250" value="10" step="1">
    <span class="val" id="sizeLabel">10</span>
    <span style="margin-left:12px;">속도</span>
    <input type="range" id="speedSlider" min="1" max="10" value="5" step="1">
    <span class="val" id="speedLabel">보통</span>
  </div>

  <div class="qs-controls">
    <button class="qs-btn primary" id="btnPlay">▶ 시작</button>
    <button class="qs-btn" id="btnStep">한 단계씩</button>
    <button class="qs-btn" id="btnReset">새 배열</button>
  </div>

  <div class="bar-area" id="barArea"></div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#0000ff"></div>
      피벗
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#1D9E75"></div>
      비교 중
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#EF9F27"></div>
      교환
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#B5D4F4"></div>
      현재 범위
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#ffff00"></div>
      정렬 완료
    </div>
  </div>

  <div class="log" id="log">배열을 생성하고 시작 버튼을 누르세요.</div>
  <div class="step-counter" id="stepCounter"></div>
</div>
</body>
<script>
  const speedMap = {
    1: 750,
    2: 500,
    3: 300,
    4: 200,
    5: 100,
    6: 50,
    7: 30,
    8: 20,
    9: 10,
    10: 0.001
  };
  const speedNames = {
    1: '매우 느림',
    2: '매우 느림',
    3: '느림',
    4: '느림',
    5: '보통',
    6: '보통',
    7: '빠름',
    8: '빠름',
    9: '매우 빠름',
    10: '최대한 빠르게'
  };

  let arr = [], steps = [], stepIdx = 0, playing = false, timer = null;

  function getSize() { return parseInt(document.getElementById('sizeSlider').value); }

  function getSpeed() { return parseInt(document.getElementById('speedSlider').value); }

  function randArr(n) {
    const vals = Array.from({length: n}, (_, i) => i + 1);
    for (let i = vals.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [vals[i], vals[j]] = [vals[j], vals[i]];
    }
    return vals;
  }

  function swap(a, i, j) {
    let t = a[i];
    a[i] = a[j];
    a[j] = t;
  }

  function medianOfThree(a, left, right) {
    const mid = Math.floor((left + right) / 2);
    if (a[left] > a[mid]) {
      swap(a, left, mid);
    }
    if (a[left] > a[right]) {
      swap(a, left, right);
    }
    if (a[mid] > a[right]) {
      swap(a, mid, right);
    }
    return mid;
  }

  function generateSteps(a, left, right, steps, sorted) {
    if (left >= right) {
      if (left === right) {
        sorted.add(left);
      }
      return;
    }

    steps.push({
      type: 'range',
      arr: [...a],
      left,
      right,
      sortedSet: new Set(sorted),
      msg: `범위 [${left}~${right}] 처리 시작`
    });

    const pivotIdx = medianOfThree(a, left, right);
    steps.push({
      type: 'median',
      arr: [...a],
      left,
      right,
      pivotIdx,
      sortedSet: new Set(sorted),
      msg: `medianOfThree → 인덱스 ${pivotIdx}의 값 ${a[pivotIdx]}이 중간값`
    });

    if (pivotIdx !== left) {
      swap(a, left, pivotIdx);
      steps.push({
        type: 'swap',
        arr: [...a],
        left,
        right,
        i: left,
        j: pivotIdx,
        sortedSet: new Set(sorted),
        msg: `피벗 ${a[left]}을 left(${left})로 이동`
      });
    }

    const pivot = a[left];
    steps.push({
      type: 'pivot',
      arr: [...a],
      pivotIdx: left,
      pivot,
      left,
      right,
      sortedSet: new Set(sorted),
      msg: `피벗 = ${pivot} (index ${left})`
    });

    let i = left, j = right;
    while (i < j) {
      while (i < j && a[j] > pivot) {
        steps.push({
          type: 'compare',
          arr: [...a],
          pivot,
          pivotIdx: left,
          i,
          j,
          left,
          right,
          sortedSet: new Set(sorted),
          msg: `j=${j} 값 ${a[j]} > 피벗 ${pivot} → j 감소`
        });
        j--;
      }
      while (i < j && a[i] <= pivot) {
        steps.push({
          type: 'compare',
          arr: [...a],
          pivot,
          pivotIdx: left,
          i,
          j,
          left,
          right,
          sortedSet: new Set(sorted),
          msg: `i=${i} 값 ${a[i]} ≤ 피벗 ${pivot} → i 증가`
        });
        i++;
      }
      if (i < j) {
        steps.push({
          type: 'compare',
          arr: [...a],
          pivot,
          pivotIdx: left,
          i,
          j,
          left,
          right,
          sortedSet: new Set(sorted),
          msg: `i=${i}(${a[i]}) ↔ j=${j}(${a[j]}) 교환`
        });
        swap(a, i, j);
        steps.push({
          type: 'swap',
          arr: [...a],
          pivot,
          pivotIdx: left,
          i,
          j,
          left,
          right,
          sortedSet: new Set(sorted),
          msg: `교환 완료`
        });
      }
    }

    swap(a, left, i);
    sorted.add(i);
    steps.push({
      type: 'placed',
      arr: [...a],
      pivotIdx: i,
      pivot,
      i,
      j,
      left,
      right,
      sortedSet: new Set(sorted),
      msg: `피벗 ${pivot} 최종 위치 확정 (index ${i})`
    });

    generateSteps(a, left, i - 1, steps, sorted);
    generateSteps(a, i + 1, right, steps, sorted);

    for (let k = left; k <= right; k++) {
      sorted.add(k);
    }
    steps.push({
      type: 'subSorted',
      arr: [...a],
      left,
      right,
      sortedSet: new Set(sorted),
      msg: `범위 [${left}~${right}] 정렬 완료`
    });
  }

  function init() {
    stopPlay();
    const n = getSize();
    arr = randArr(n);
    steps = [];
    const sorted = new Set();
    generateSteps([...arr], 0, arr.length - 1, steps, sorted);
    const allSorted = new Set(Array.from({length: arr.length}, (_, i) => i));
    steps.push({
      type: 'done',
      arr: steps[steps.length - 1]?.arr || [...arr],
      sortedSet: allSorted,
      msg: '정렬 완료!'
    });
    stepIdx = 0;
    renderStep({type: 'init', arr: [...arr], sortedSet: new Set(), msg: '시작 버튼을 누르세요.'});
    document.getElementById('stepCounter').textContent = '';
    document.getElementById('btnPlay').disabled = false;
  }

  function renderStep(step) {
    const barArea = document.getElementById('barArea');
    const log = document.getElementById('log');
    const maxVal = Math.max(...step.arr);
    const showNum = step.arr.length <= 15;
    barArea.style.gridTemplateColumns = `repeat(${step.arr.length}, 1fr)`;

    barArea.innerHTML = step.arr.map((v, idx) => {
      let cls = 'bar normal';
      if (step.sortedSet?.has(idx)) {
        cls = 'bar sorted';
      } else if (step.left !== undefined && idx >= step.left && idx <= step.right) {
        cls = 'bar range';
      }
      if ((step.type === 'pivot' || step.type === 'median') && idx
          === step.pivotIdx) {
        cls = 'bar pivot';
      }
      if (step.type === 'compare' && (idx === step.i || idx === step.j)) {
        cls = 'bar comparing';
      }
      if (step.type === 'swap' && (idx === step.i || idx === step.j)) {
        cls = 'bar swap';
      }
      if (step.type === 'placed' && idx === step.pivotIdx) {
        cls = 'bar sorted';
      }
      if (step.type === 'done') {
        cls = 'bar sorted';
      }
      const h = Math.max(14, Math.round((v / maxVal) * 140));
      const textColor = cls.includes('sorted') ? '#27500A' : cls.includes('comparing') ? '#085041'
          : cls.includes('pivot') ? '#993C1D' : cls.includes('swap') ? '#633806' : '#3C3489';
      return `<div class="${cls}" style="height:${h}px"><span style="color:${textColor}">${showNum
          ? v : ''}</span></div>`;
    }).join('');

    let tag = '';
    if (step.type === 'pivot' || step.type
        === 'median') {
      tag = '<span class="phase-tag phase-pivot">피벗 선택</span>';
    } else if (step.type === 'compare') {
      tag = '<span class="phase-tag phase-compare">비교</span>';
    } else if (step.type === 'swap') {
      tag = '<span class="phase-tag phase-swap">교환</span>';
    } else if (step.type === 'placed' || step.type
        === 'subSorted') {
      tag = '<span class="phase-tag phase-done">정렬됨</span>';
    } else if (step.type === 'done') {
      tag = '<span class="phase-tag phase-done">완료</span>';
    }
    log.innerHTML = tag + (step.msg || '');
  }

  function playStep() {
    if (stepIdx >= steps.length) {
      stopPlay();
      return;
    }
    renderStep(steps[stepIdx]);
    document.getElementById('stepCounter').textContent = `${stepIdx + 1} / ${steps.length} 단계`;
    stepIdx++;
  }

  function stopPlay() {
    playing = false;
    clearInterval(timer);
    document.getElementById('btnPlay').textContent = '▶ 시작';
  }

  document.getElementById('btnPlay').addEventListener('click', () => {
    if (playing) {
      stopPlay();
      return;
    }
    if (stepIdx >= steps.length) {
      return;
    }
    playing = true;
    document.getElementById('btnPlay').textContent = '⏸ 일시정지';
    timer = setInterval(playStep, speedMap[getSpeed()]);
  });

  document.getElementById('btnStep').addEventListener('click', () => {
    stopPlay();
    if (stepIdx < steps.length) {
      renderStep(steps[stepIdx]);
      document.getElementById('stepCounter').textContent = `${stepIdx + 1} / ${steps.length} 단계`;
      stepIdx++;
    }
  });

  document.getElementById('btnReset').addEventListener('click', init);

  document.getElementById('sizeSlider').addEventListener('input', (e) => {
    document.getElementById('sizeLabel').textContent = e.target.value;
    init();
  });

  document.getElementById('speedSlider').addEventListener('input', (e) => {
    document.getElementById('speedLabel').textContent = speedNames[e.target.value];
    if (playing) {
      clearInterval(timer);
      timer = setInterval(playStep, speedMap[getSpeed()]);
    }
  });

  init();
</script>
</html>
